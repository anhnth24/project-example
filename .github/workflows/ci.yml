name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  architecture-boundaries:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Check dependency boundaries
        run: python3 scripts/check-architecture-boundaries.py
      - name: Test boundary checker fixtures
        run: python3 scripts/check-architecture-boundaries.py --self-test

  roadmap:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Check generated roadmap
        run: python3 scripts/build-roadmap.py --check

  rust:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang cmake pkg-config \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Enforce strict Clippy for new server boundaries
        run: cargo clippy --no-deps -p fileconv-knowledge -p fileconv-server --all-targets -- -D warnings
      - name: Reject new Clippy warnings in legacy crates
        run: python3 scripts/check-rust-lint-baseline.py
      - name: Test Clippy baseline parser
        run: python3 scripts/check-rust-lint-baseline.py --self-test
      - name: Test core
        run: cargo test -p fileconv-core
      - name: Test LLM protocols and bridges
        run: cargo test -p fileconv-core --features llm llm
      - name: Test desktop backend
        run: cargo test -p fileconv-desktop
      - name: Test CLI metrics
        run: cargo test -p fileconv-cli metrics

  frontend:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build

  web:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter markhand-web format:check
      - run: pnpm --filter markhand-web lint
      - run: pnpm --filter markhand-web test
      - run: pnpm --filter markhand-web build

  linux-bundle:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install native bundle dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang cmake pkg-config \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf file
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: app
      - run: pnpm tauri build --bundles deb --no-sign --ci
        working-directory: app
      - run: bash scripts/validate-desktop-bundle.sh
