name: Sync Markhand Web issues

on:
  push:
    branches: [master]
    paths:
      - "plans/markhand-web/backlog/**"
      - "scripts/sync-github-issues.py"
      - ".github/workflows/sync-markhand-issues.yml"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Verify preinstalled GitHub CLI
        run: gh --version
      - name: Ensure phase milestones
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/sync-github-issues.py --milestones-only
      - name: Sync backlog issues and completion state to GitHub
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/sync-github-issues.py --create --update --sync-status
