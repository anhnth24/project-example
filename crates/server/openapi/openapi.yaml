      type: object
      required: [hasMore]
      properties:
        nextCursor:
          type: string
        hasMore:
          type: boolean
    SseEnvelope:
      type: object
      required: [version, sequence, event, requestId, data]
      properties:
        version:
          type: integer
          format: int32
          enum: [1]
        sequence:
          type: integer
          format: int64
          minimum: 0
        event:
          type: string
          description: Stable event name, for example `job.status`, `job.done`, `job.close`, `ask.token`, `ask.citations`, `ask.warning`, or `ask.done`.
        requestId:
          type: string
        data: {}
