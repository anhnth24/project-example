# Current cloud runner cannot route between nested bridge containers. This override is
# smoke-only and must never be used for Profile B evidence.
services:
  minio-init:
    network_mode: host
    networks: !reset []
    environment:
      MC_HOST_local: http://${MARKHAND_MINIO_USER:-markhand}:${MARKHAND_MINIO_PASSWORD:-markhand_spike_only}@127.0.0.1:${MARKHAND_SPIKE_MINIO_API_PORT:-19000}
