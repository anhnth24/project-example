components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  headers:
    RequestId:
      description: Validated or server-generated request id
      schema:
        type: string
        format: uuid
    RetryAfter:
      description: Seconds until rate-limit window resets
      schema:
        type: integer
        minimum: 1
  parameters:
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
    CollectionId:
      name: collectionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DocumentId:
      name: documentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VersionId:
      name: versionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ConflictId:
      name: conflictId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
  responses:
    ApiError:
      description: Canonical API error
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    RateLimited:
      description: Rate limit exceeded
      headers:
        Retry-After:
          $ref: '#/components/headers/RetryAfter'
        X-RateLimit-Limit:
          description: Configured request budget for the active scope
          schema:
            type: integer
            minimum: 0
        X-RateLimit-Remaining:
          description: Remaining requests in the current window
          schema:
            type: integer
            minimum: 0
        X-RateLimit-Reset:
          description: Seconds until the current window resets
          schema:
            type: integer
            minimum: 1
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RateLimitedError'
  schemas:
    Health:
      type: object
      required:
      - status
      - requestId
      properties:
        status:
          type: string
          enum:
          - ok
        requestId:
          type: string
          format: uuid
    Startup:
      type: object
      required:
      - status
      - completed
      - degraded
      - requestId
      properties:
        status:
          type: string
          enum:
          - ok
          - degraded
          - starting
        completed:
          type: boolean
        degraded:
          type: boolean
        requestId:
          type: string
          format: uuid
    ApiError:
      type: object
      required:
      - code
      - message
      - requestId
      properties:
        code:
          type: string
        message:
          type: string
        requestId:
          type: string
          format: uuid
        details: {}
    RateLimitedError:
      type: object
      required:
      - code
      - message
      - requestId
      - details
      properties:
        code:
          type: string
          enum:
          - rate_limited
        message:
          type: string
        requestId:
          type: string
          format: uuid
        details:
          type: object
          required:
          - limit
          - remaining
          - resetSecs
          - scope
          properties:
            limit:
              type: integer
            remaining:
              type: integer
            resetSecs:
              type: integer
            scope:
              type: string
            quota:
              type: object
              required:
              - limit
              - remaining
              - resetSecs
              - scope
              properties:
                limit:
                  type: integer
                remaining:
                  type: integer
                resetSecs:
                  type: integer
                scope:
                  type: string
    PageInfo:
      type: object
      required:
      - hasMore
      properties:
        nextCursor:
          type:
          - string
          - 'null'
        hasMore:
          type: boolean
    LoginRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
        password:
          type: string
          writeOnly: true
    RefreshRequest:
      type: object
      required:
      - refreshToken
