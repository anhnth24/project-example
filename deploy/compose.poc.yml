  MARKHAND_MAX_ARCHIVE_COMPRESSION_RATIO: "${MARKHAND_MAX_ARCHIVE_COMPRESSION_RATIO:-100}"
  MARKHAND_MAX_PDF_PAGES: "${MARKHAND_MAX_PDF_PAGES:-500}"
