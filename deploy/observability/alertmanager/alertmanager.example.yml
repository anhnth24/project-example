# Alertmanager example routing for P1B-O02.
# PLACEHOLDER receivers only — no real webhook URLs, tokens, or emails.
global:
  resolve_timeout: 5m

route:
  receiver: default-log
  group_by: [alertname, class, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="page"
      receiver: pager-placeholder
      continue: true
    - matchers:
        - class="auth"
      receiver: security-placeholder
      continue: true
    - matchers:
        - severity="ticket"
      receiver: ticket-placeholder

# No inhibit_rules: prior broad class-based inhibition was incorrect (no shared
# causal label across slo/queue/parser). Add inhibitions only when a genuine
# shared label (e.g. dependency) exists on both source and target alerts.

receivers:
  - name: default-log
  - name: pager-placeholder
    webhook_configs:
      - url: https://alerts.example.invalid/pagerduty-placeholder
        send_resolved: true
        http_config:
          authorization:
            type: Bearer
            credentials: "REPLACE_WITH_SEALED_SECRET"
  - name: ticket-placeholder
    webhook_configs:
      - url: https://alerts.example.invalid/ticket-placeholder
        send_resolved: true
        http_config:
          authorization:
            type: Bearer
            credentials: "REPLACE_WITH_SEALED_SECRET"
  - name: security-placeholder
    webhook_configs:
      - url: https://alerts.example.invalid/security-placeholder
        send_resolved: true
        http_config:
          authorization:
            type: Bearer
            credentials: "REPLACE_WITH_SEALED_SECRET"

templates: []
