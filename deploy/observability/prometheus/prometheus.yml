# Live O02 Prometheus config — loads markhand-rules.yml and scrapes Compose deps.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/markhand-rules.yml

scrape_configs:
  - job_name: markhand-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8787"]

  - job_name: markhand-postgres
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets: ["postgres:5432"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  - job_name: markhand-qdrant
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets: ["qdrant:6333"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  - job_name: markhand-minio
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets: ["minio:9000"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  - job_name: markhand-embedding
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets: ["mock-embedding:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115
