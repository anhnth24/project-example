services:
  postgres:
    image: postgres:18.4-bookworm@sha256:1961f96e6029a02c3812d7cb329a3b03a3ac2bb067058dec17b0f5596aca9296
    ports: !override
      - "127.0.0.1:${MARKHAND_SPIKE_POSTGRES_PORT:-15432}:5432"
    shm_size: 1gb
    labels:
      markhand.environment: benchmark-spike

  qdrant:
    image: qdrant/qdrant:v1.18.2@sha256:75eab8c4ba42096724fdcfde8b4de0b5713d529dde32f285a1f86fdcb2c9e50c
    ports: !override
      - "127.0.0.1:${MARKHAND_SPIKE_QDRANT_HTTP_PORT:-16333}:6333"
      - "127.0.0.1:${MARKHAND_SPIKE_QDRANT_GRPC_PORT:-16334}:6334"
    labels:
      markhand.environment: benchmark-spike

  minio:
    image: pgsty/minio:RELEASE.2026-06-18T00-00-00Z@sha256:dacff8306a6e0a734518533992dbdcca26bc1ca47f77cf47cb9945725f92b29b
    ports: !override
      - "127.0.0.1:${MARKHAND_SPIKE_MINIO_API_PORT:-19000}:9000"
      - "127.0.0.1:${MARKHAND_SPIKE_MINIO_CONSOLE_PORT:-19001}:9001"
    labels:
      markhand.environment: benchmark-spike

  otel:
    image: otel/opentelemetry-collector-contrib:0.156.0@sha256:125bdbeb7590cc1952c5b3430ecf14063568980c2c93d5b38676cc0446ed8108
    ports: !override
      - "127.0.0.1:${MARKHAND_SPIKE_OTEL_HEALTH_PORT:-13143}:13133"
      - "127.0.0.1:${MARKHAND_SPIKE_OTEL_GRPC_PORT:-14317}:4317"
    labels:
      markhand.environment: benchmark-spike

  mock-embedding:
    image: python:3.12.12-alpine@sha256:2d91681153dd4b8cdb52d4fd34a17b9edbafa4dd3086143cfd4b6c3a84c1acb0
    ports: !override
      - "127.0.0.1:${MARKHAND_SPIKE_MOCK_EMBEDDING_PORT:-18088}:8080"
    environment:
      MARKHAND_MOCK_EMBEDDING_DIMENSIONS: ${MARKHAND_SPIKE_MOCK_DIMENSIONS:-1024}
    labels:
      markhand.environment: benchmark-spike

  vllm:
    image: vllm/vllm-openai:v0.12.0@sha256:5043179796ab4088c5551d28db820f5d4959b51ef472793e7f7c0a4ac4f6e311
    ports: !override
      - "127.0.0.1:${MARKHAND_SPIKE_VLLM_PORT:-18000}:8000"
    volumes:
      - model_cache:/root/.cache:rw
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${MARKHAND_SPIKE_GPU_COUNT:-1}
              capabilities: [gpu]
    labels:
      markhand.environment: benchmark-spike

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727

volumes:
  postgres_data:
    name: ${MARKHAND_SPIKE_VOLUME_PREFIX:-markhand-spike}_postgres
  qdrant_data:
    name: ${MARKHAND_SPIKE_VOLUME_PREFIX:-markhand-spike}_qdrant
  minio_data:
    name: ${MARKHAND_SPIKE_VOLUME_PREFIX:-markhand-spike}_minio
  model_cache:
    name: ${MARKHAND_SPIKE_VOLUME_PREFIX:-markhand-spike}_models
