name: Sync Markhand Web issues

on:
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install GitHub CLI
        run: sudo apt-get update && sudo apt-get install -y gh
      - name: Ensure phase milestones
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/sync-github-issues.py --milestones-only
      - name: Sync backlog issues to GitHub
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/sync-github-issues.py --create
