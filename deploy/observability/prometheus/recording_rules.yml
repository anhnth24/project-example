# Recording rules for P1B-O02. Metric names/labels follow O01 allowlist.
# End-to-end query SLO uses API route=search only (not internal retrieval legs).
groups:
  - name: markhand.recording.slo
    interval: 30s
    rules:
      - record: markhand:api_search:p95_5m
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (
              rate(markhand_api_request_duration_seconds_bucket{route="search"}[5m])
            )
          )
        labels:
          quantile: "0.95"
          window: 5m
          route: search

      - record: markhand:api_search:success_ratio_5m
        expr: |
          (
            sum(rate(markhand_api_requests_total{route="search", status_class="2xx"}[5m]))
            /
            clamp_min(sum(rate(markhand_api_requests_total{route="search"}[5m])), 1e-9)
          )
        labels:
          window: 5m
          route: search

  - name: markhand.recording.queue
    interval: 30s
    rules:
      - record: markhand:queue:depth_max
        expr: max by (queue) (markhand_queue_depth)

      - record: markhand:queue:oldest_age_seconds_max
        expr: max by (queue) (markhand_queue_oldest_age_seconds)

      - record: markhand:job:dead_letter_increase_5m
        expr: |
          sum by (job_type) (
            increase(markhand_job_transitions_total{result="dead_letter"}[5m])
          )
        labels:
          window: 5m

  - name: markhand.recording.errors
    interval: 30s
    rules:
      - record: markhand:conversion:error_ratio_10m
        expr: |
          (
            sum(rate(markhand_conversion_total{result=~"error|other"}[10m]))
            /
            clamp_min(sum(rate(markhand_conversion_total[10m])), 1e-9)
          )
        labels:
          window: 10m

      # Embedding failures: explicit enums + residual other (tradeoff documented).
      - record: markhand:embedding:failure_ratio_10m
        expr: |
          (
            sum(rate(markhand_embedding_total{result=~"error|http_error|invalid_response|other"}[10m]))
            /
            clamp_min(sum(rate(markhand_embedding_total[10m])), 1e-9)
          )
        labels:
          window: 10m

      - record: markhand:retrieval:failure_ratio_10m
        expr: |
          (
            sum(rate(markhand_retrieval_total{result=~"error|other"}[10m]))
            /
            clamp_min(sum(rate(markhand_retrieval_total[10m])), 1e-9)
          )
        labels:
          window: 10m

      - record: markhand:qa_provider:failure_ratio_10m
        expr: |
          (
            sum(rate(markhand_retrieval_total{leg="qa_provider", result=~"error|outage|timeout|truncated|other"}[10m]))
            /
            clamp_min(sum(rate(markhand_retrieval_total{leg="qa_provider"}[10m])), 1e-9)
          )
        labels:
          window: 10m

      - record: markhand:auth:deny_increase_10m
        expr: |
          sum(increase(markhand_auth_decisions_total{result="deny"}[10m]))
        labels:
          window: 10m

      - record: markhand:drift:increase_10m
        expr: sum(increase(markhand_drift_total[10m]))
        labels:
          window: 10m

      - record: markhand:reconcile:error_increase_5m
        expr: |
          sum(increase(markhand_reconcile_total{result="error"}[5m]))
        labels:
          window: 5m

  - name: markhand.recording.disk
    interval: 30s
    rules:
      - record: markhand:disk:free_ratio
        expr: |
          (
            node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"}
            /
            clamp_min(node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"}, 1)
          )
