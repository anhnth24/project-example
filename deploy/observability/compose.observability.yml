# Observability overlay for the POC stack (P1B-O02).
#
# REQUIRED invocation (repo-root project directory + REPO_ROOT binds):
#
#   REPO_ROOT="$(git rev-parse --show-toplevel)"
#   docker compose --project-directory "$REPO_ROOT" \
#     --env-file "$REPO_ROOT/deploy/.env" \
#     -f "$REPO_ROOT/deploy/compose.poc.yml" \
#     -f "$REPO_ROOT/deploy/observability/compose.observability.yml" \
#     up -d
#
# Or: bash "$REPO_ROOT/deploy/observability/up.sh" up -d
#
# Bind sources are ${REPO_ROOT}/deploy/observability/... so they resolve under
# --project-directory "$REPO_ROOT" regardless of caller CWD.
#
# Docker is required at runtime. This VM may not have Docker; validation uses
# pinned promtool + static path/network matrix checks instead of a live stack.
name: ${MARKHAND_COMPOSE_PROJECT:-markhand-poc}

services:
  # --- Observability sidecars ---
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.156.0@sha256:125bdbeb7590cc1952c5b3430ecf14063568980c2c93d5b38676cc0446ed8108
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ${REPO_ROOT:?REPO_ROOT must be absolute repo root}/deploy/observability/otel/collector-prometheus.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:8889:8889"
      - "127.0.0.1:13133:13133"
    # private: API/index/embedding workers + Prometheus scrape
    # convert: convert worker only (internal:true — no external egress path)
    networks: [private, convert]
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2@sha256:4032c6d5bfd752342c3e631c2f1de93ba6b86c41db6b167b9a35372c139e7706
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run|var/lib/docker/.+)($$|/)
      - --web.listen-address=:9100
    volumes:
      # Host rootfs only. Named Docker volume attribution (PG/MinIO) is unavailable/blocked.
      - /:/host:ro,rslave
    networks: [private]
    restart: unless-stopped
    pid: host

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0@sha256:b04a9fef4fa086a02fc7fcd8dcdbc4b7b35cc30cdee860fdc6a19dd8b208d63e
    command:
      - --config.file=/etc/blackbox/blackbox.yml
    volumes:
      - ${REPO_ROOT:?REPO_ROOT must be absolute repo root}/deploy/observability/blackbox/blackbox.yml:/etc/blackbox/blackbox.yml:ro
    networks: [private]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1@sha256:2659f4c2ebb718e7695cb9b25ffa7d6be64db013daba13e05c875451cf51b0d3
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --storage.tsdb.retention.time=7d
    volumes:
      - ${REPO_ROOT:?REPO_ROOT must be absolute repo root}/deploy/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${REPO_ROOT:?REPO_ROOT must be absolute repo root}/deploy/observability/prometheus/recording_rules.yml:/etc/prometheus/rules/recording_rules.yml:ro
      - ${REPO_ROOT:?REPO_ROOT must be absolute repo root}/deploy/observability/prometheus/alert_rules.yml:/etc/prometheus/rules/alert_rules.yml:ro
    ports:
      - "127.0.0.1:9090:9090"
    depends_on: [otel-collector, alertmanager, node-exporter, blackbox-exporter]
    networks: [private]
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0@sha256:e13b6ed5cb929eeaee733479dce55e10eb3bc2e9c4586c705a4e8da41e5eacf5
    volumes:
      - ${REPO_ROOT:?REPO_ROOT must be absolute repo root}/deploy/observability/alertmanager/alertmanager.example.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "127.0.0.1:9093:9093"
    networks: [private]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0@sha256:408afb9726de5122b00a2576763a8a57a3c86d5b0eff5305bc994ceb3eb96c3f
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - ${REPO_ROOT:?REPO_ROOT must be absolute repo root}/deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ${REPO_ROOT:?REPO_ROOT must be absolute repo root}/deploy/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on: [prometheus]
    networks: [private]
    restart: unless-stopped

  # --- Merge OTLP env into telemetry emitters (compose map-merge with POC file) ---
  # Dev/POC: internal HTTP to in-compose collector is allowed (MARKHAND_PROFILE=dev).
  # Production contract remains HTTPS (telemetry config fails closed on remote http).
  api:
    environment:
      MARKHAND_OTEL_EXPORTER: otlp
      MARKHAND_OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      MARKHAND_OTEL_METRICS_ENABLED: "true"
      MARKHAND_OTEL_SERVICE_NAME: markhand-api

  worker-index:
    environment:
      MARKHAND_OTEL_EXPORTER: otlp
      MARKHAND_OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      MARKHAND_OTEL_METRICS_ENABLED: "true"
      MARKHAND_OTEL_SERVICE_NAME: markhand-worker-index

  worker-embedding:
    environment:
      MARKHAND_OTEL_EXPORTER: otlp
      MARKHAND_OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      MARKHAND_OTEL_METRICS_ENABLED: "true"
      MARKHAND_OTEL_SERVICE_NAME: markhand-worker-embedding

  worker-convert:
    environment:
      MARKHAND_OTEL_EXPORTER: otlp
      MARKHAND_OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      MARKHAND_OTEL_METRICS_ENABLED: "true"
      MARKHAND_OTEL_SERVICE_NAME: markhand-worker-convert
    # Remains on convert-only network (no private/edge). Reaches collector via convert.

  # Stable private-network DNS alias `embedding` for mock and aiteamvn profiles.
  mock-embedding:
    networks:
      private:
        aliases: [embedding]

  embedding-cpu:
    networks:
      private:
        aliases: [embedding]

networks:
  private:
    driver: bridge
  convert:
    driver: bridge
    internal: true
