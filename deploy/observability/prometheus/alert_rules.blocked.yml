# BLOCKED alerts — intentionally NOT listed in prometheus.yml rule_files.
# Kept for documentation / inventory; loading them would claim false coverage.
groups:
  - name: markhand.alerts.blocked
    rules:
      - alert: MarkhandQueryLatencyP99Burn
        expr: vector(0) > 1
        labels:
          severity: page
          team: operations
          class: slo
          status: blocked
        annotations:
          summary: BLOCKED — filtered-query P99 series is not emitted by O01.
          description: >
            Formal gate G0-SLO-QUERY-P99 targets filtered-query P99 <=1000ms.
            O01 emits markhand_api_request_duration_seconds{route="search"} and
            retrieval-leg histograms, not a filtered-query end-to-end series.
            Do not enable until a filtered-query latency metric exists.
          threshold_source: G0-SLO-QUERY-P99
          runbook: docs/runbooks/dependency-outage.md
          dashboard: markhand-slo
          coverage: blocked

      - alert: MarkhandGlmProbeDown
        expr: vector(0) > 1
        labels:
          severity: ticket
          team: operations
          class: dependency
          status: blocked
        annotations:
          summary: BLOCKED — no configured GLM health endpoint for blackbox probing.
          description: >
            Deploy stacks do not define a stable GLM/health URL. Use metric-based
            MarkhandGlmProviderErrors (qa_provider failure ratio) instead.
          threshold_source: O02-OPS-PROBE-FAILURE
          runbook: docs/runbooks/glm-fallback.md
          dashboard: markhand-deps
          coverage: blocked

      - alert: MarkhandReconcileErrors
        expr: |
          sum(increase(markhand_reconcile_total{result="error"}[5m])) > 0
        labels:
          severity: ticket
          team: operations
          class: drift
          status: blocked
        annotations:
          summary: BLOCKED — reconcile result=error is not emitted by product telemetry.
          description: >
            BLOCKED event policy O02-OPS-RECONCILE-ERROR-EVENT-BLOCKED (increase > 0).
            record_reconcile() product paths label result as success or drift only.
            This alert is NOT loaded and does not imply active coverage. Prefer live
            MarkhandDriftDetected (O02-OPS-DRIFT-COUNT on markhand_drift_total) for drift.
            Do not invent fake fixtures or dashboard panels for result="error".
          threshold_source: O02-OPS-RECONCILE-ERROR-EVENT-BLOCKED
          runbook: docs/runbooks/vector-rebuild.md
          dashboard: markhand-ops
          coverage: blocked
          block_reason: unemitted markhand_reconcile_total{result="error"}

      - alert: MarkhandNamedVolumeDiskLow
        expr: |
          (
            node_filesystem_avail_bytes{mountpoint=~".*postgres.*|.*/data.*"}
            /
            clamp_min(node_filesystem_size_bytes{mountpoint=~".*postgres.*|.*/data.*"}, 1)
          ) < 0.30
        for: 10m
        labels:
          severity: page
          team: operations
          class: disk
          status: blocked
        annotations:
          summary: BLOCKED — Docker named-volume free-space attribution unavailable.
          description: >
            Host-only node_exporter bind-mount (/host → mountpoint="/") cannot attribute
            free space to Compose named volumes (pgdata/miniodata). Volume-specific disk
            alerts remain blocked. Use MarkhandHostRootFilesystemLow for host capacity.
          threshold_source: WORKLOAD-DISK-HEADROOM-PERCENT
          runbook: docs/runbooks/disk-exhaustion.md
          dashboard: markhand-ops
          coverage: blocked
          block_reason: named-volume attribution unavailable with host-only node_exporter
