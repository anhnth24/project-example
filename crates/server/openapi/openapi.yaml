openapi: 3.1.0
info:
  title: Markhand Web API
  version: 0.1.0
  description: Phase 1B POC API contract for shipped `/api/v1` routes.
servers:
  - url: /api/v1
tags:
  - name: Health
  - name: Auth
  - name: Uploads
  - name: Collections
  - name: Documents
  - name: Jobs
  - name: Search
  - name: Ask
paths:
  /health/live:
    get:
      tags: [Health]
      operationId: healthLive
      responses:
        "200":
          description: Process health; does not contact dependencies.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /health/ready:
    get:
      tags: [Health]
      operationId: healthReady
      responses:
        "200":
          description: PostgreSQL, Qdrant and MinIO are reachable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "503":
          $ref: "#/components/responses/ApiError"
  /health/start:
    get:
      tags: [Health]
      operationId: healthStart
      responses:
        "200":
          description: Startup has completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "503":
          $ref: "#/components/responses/ApiError"
  /auth/login:
    post:
      tags: [Auth]
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Password login succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/ApiError"
        "401":
          $ref: "#/components/responses/ApiError"
        "403":
          $ref: "#/components/responses/ApiError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ApiError"
        "503":
          $ref: "#/components/responses/ApiError"
  /auth/refresh:
    post:
      tags: [Auth]
      operationId: authRefresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Refresh token rotation succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/ApiError"
        "401":
          $ref: "#/components/responses/ApiError"
        "403":
          $ref: "#/components/responses/ApiError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ApiError"
        "503":
          $ref: "#/components/responses/ApiError"
  /auth/logout:
    post:
      tags: [Auth]
      operationId: authLogout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "204":
          description: Refresh token family logout accepted.
        "400":
          $ref: "#/components/responses/ApiError"
        "401":
          $ref: "#/components/responses/ApiError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ApiError"
        "503":
          $ref: "#/components/responses/ApiError"
  /auth/me:
    get:
      tags: [Auth]
      operationId: authMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current authenticated principal and authorization context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/ApiError"
        "403":
          $ref: "#/components/responses/ApiError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ApiError"
        "503":
          $ref: "#/components/responses/ApiError"
  /uploads:
    post:
      tags: [Uploads]
      operationId: createUpload
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Upload accepted or quarantined.
          headers:
            x-quota-resource:
              $ref: "#/components/headers/QuotaResource"
            x-quota-limit:
              $ref: "#/components/headers/QuotaLimit"
            x-quota-used:
              $ref: "#/components/headers/QuotaUsed"
            x-quota-reserved:
              $ref: "#/components/headers/QuotaReserved"
            x-quota-remaining:
              $ref: "#/components/headers/QuotaRemaining"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "400":
          $ref: "#/components/responses/ApiError"
        "401":
          $ref: "#/components/responses/ApiError"
        "403":
          $ref: "#/components/responses/ApiError"
        "413":
          $ref: "#/components/responses/ApiError"
        "429":
          $ref: "#/components/responses/QuotaOrRateLimited"
        "500":
          $ref: "#/components/responses/ApiError"
        "503":
          $ref: "#/components/responses/ApiError"
  /collections:
    get:
      tags: [Collections]
      operationId: listCollections
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Authorized collections page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionListResponse"
        "400":
          $ref: "#/components/responses/ApiError"
        "401":
          $ref: "#/components/responses/ApiError"
        "403":
          $ref: "#/components/responses/ApiError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ApiError"
        "503":
          $ref: "#/components/responses/ApiError"
    post:
      tags: [Collections]
      operationId: createCollection
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCollectionRequest"
      responses:
        "201":
          description: Collection created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collection"
        "400":
          $ref: "#/components/responses/ApiError"
        "401":
          $ref: "#/components/responses/ApiError"
        "403":
          $ref: "#/components/responses/ApiError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ApiError"
  /collections/{collectionId}:
    get:
      tags: [Collections]
      operationId: getCollection
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CollectionId"
      responses:
        "200":
          description: Collection metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collection"
        "400":
          $ref: "#/components/responses/ApiError"
        "401":
          $ref: "#/components/responses/ApiError"
        "403":
          $ref: "#/components/responses/ApiError"
        "404":
          $ref: "#/components/responses/ApiError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ApiError"
  /collections/{collectionId}/documents:
    get:
      tags: [Documents]
      operationId: listCollectionDocuments
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CollectionId"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Documents in the collection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentListResponse"
        "400":
          $ref: "#/components/responses/ApiError"
        "401":
          $ref: "#/components/responses/ApiError"
        "403":
          $ref: "#/components/responses/ApiError"
        "404":
          $ref: "#/components/responses/ApiError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ApiError"
        "503":
          $ref: "#/components/responses/ApiError"
    post:
      tags: [Documents]
      operationId: createDocumentFromUpload
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CollectionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocumentRequest"
      responses:
        "201":
          description: Document and source version created; conversion job enqueued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDocumentResponse"
        "400":
          $ref: "#/components/responses/ApiError"
        "401":
          $ref: "#/components/responses/ApiError"
        "403":
          $ref: "#/components/responses/ApiError"
        "404":
          $ref: "#/components/responses/ApiError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ApiError"
        "503":
          $ref: "#/components/responses/ApiError"
  /documents/{documentId}:
    get:
      tags: [Documents]
      operationId: getDocument
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "200":
          description: Document metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "400":
          $ref: "#/components/responses/ApiError"
        "401":
          $ref: "#/components/responses/ApiError"
        "403":
          $ref: "#/components/responses/ApiError"
        "404":
          $ref: "#/components/responses/ApiError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ApiError"
    delete:
      tags: [Documents]
      operationId: deleteDocument
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Delete was already requested.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDocumentResponse"
        "202":
          description: Delete requested and job enqueued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDocumentResponse"
        "400":
          $ref: "#/components/responses/ApiError"
        "401":
          $ref: "#/components/responses/ApiError"
        "403":
          $ref: "#/components/responses/ApiError"
        "404":
          $ref: "#/components/responses/ApiError"
        "409":
          $ref: "#/components/responses/ApiError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ApiError"
        "503":
          $ref: "#/components/responses/ApiError"
  /documents/{documentId}:reindex:
    post:
      tags: [Documents]
      operationId: reindexDocument
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "202":
          description: Index job enqueued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobSummary"
        "400":
          $ref: "#/components/responses/ApiError"
        "401":
          $ref: "#/components/responses/ApiError"
        "403":
          $ref: "#/components/responses/ApiError"
        "404":
          $ref: "#/components/responses/ApiError"
        "409":
          $ref: "#/components/responses/ApiError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ApiError"
  /documents/{documentId}/versions:
    get:
      tags: [Documents]
      operationId: listDocumentVersions
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Document versions page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentVersionListResponse"
        "400":
          $ref: "#/components/responses/ApiError"
        "401":
          $ref: "#/components/responses/ApiError"
        "403":
          $ref: "#/components/responses/ApiError"
        "404":
          $ref: "#/components/responses/ApiError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ApiError"
        "503":
          $ref: "#/components/responses/ApiError"
  /documents/{documentId}/versions/{versionId}/citations:resolve:
    post:
      tags: [Documents]
      operationId: resolveCitation
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
        - $ref: "#/components/parameters/VersionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CitationPin"
      responses:
        "200":
          description: Citation resolved against live authorization and source content.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolvedCitation"
        "400":
          $ref: "#/components/responses/ApiError"
        "401":
          $ref: "#/components/responses/ApiError"
        "403":
          $ref: "#/components/responses/ApiError"
        "404":
          $ref: "#/components/responses/ApiError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ApiError"
  /documents/{documentId}/versions/{versionId}/preview:
    get:
      tags: [Documents]
      operationId: getMarkdownPreview
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Markdown preview bytes.
          headers:
            x-content-type-options:
              schema:
                type: string
                enum: [nosniff]
          content:
            text/markdown; charset=utf-8:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/ApiError"
        "403":
          $ref: "#/components/responses/ApiError"
        "404":
          $ref: "#/components/responses/ApiError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ApiError"
        "503":
          $ref: "#/components/responses/ApiError"
  /documents/{documentId}/versions/{versionId}/download:
    post:
      tags: [Documents]
      operationId: authorizeDownload
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Short-lived, one-time download capability.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadCapability"
        "401":
          $ref: "#/components/responses/ApiError"
        "403":
          $ref: "#/components/responses/ApiError"
        "404":
          $ref: "#/components/responses/ApiError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ApiError"
        "503":
          $ref: "#/components/responses/ApiError"
  /documents/download/{token}:
    get:
      tags: [Documents]
      operationId: redeemDownload
      parameters:
        - $ref: "#/components/parameters/DownloadToken"
      responses:
        "200":
          description: Original uploaded object bytes.
          headers:
            content-disposition:
              schema:
                type: string
            x-content-type-options:
              schema:
                type: string
                enum: [nosniff]
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/ApiError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ApiError"
        "503":
          $ref: "#/components/responses/ApiError"
  /jobs/{jobId}:
    get:
      tags: [Jobs]
      operationId: getJob
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Job snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "400":
          $ref: "#/components/responses/ApiError"
        "401":
          $ref: "#/components/responses/ApiError"
        "403":
          $ref: "#/components/responses/ApiError"
        "404":
          $ref: "#/components/responses/ApiError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ApiError"
  /jobs/{jobId}/events:
    get:
      tags: [Jobs]
      operationId: streamJobEvents
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Server-sent job status events. Event names are `job.status`, `job.done`, and `job.close`.
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/SseEnvelope"
        "400":
          $ref: "#/components/responses/ApiError"
        "401":
          $ref: "#/components/responses/ApiError"
        "403":
          $ref: "#/components/responses/ApiError"
        "404":
          $ref: "#/components/responses/ApiError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ApiError"
  /search:
    post:
      tags: [Search]
      operationId: search
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
      responses:
        "200":
          description: Grounded retrieval hits.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
        "400":
          $ref: "#/components/responses/ApiError"
        "401":
          $ref: "#/components/responses/ApiError"
        "403":
          $ref: "#/components/responses/ApiError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ApiError"
  /ask:
    post:
      tags: [Ask]
      operationId: ask
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AskRequest"
      responses:
        "200":
          description: Grounded answer collected from the QA stream.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AskResponse"
        "400":
          $ref: "#/components/responses/ApiError"
        "401":
          $ref: "#/components/responses/ApiError"
        "403":
          $ref: "#/components/responses/ApiError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ApiError"
  /ask/stream:
    post:
      tags: [Ask]
      operationId: streamAsk
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/LastEventId"
      requestBody:
        required: false
        description: Required when starting a stream. Omitted on replay requests that provide `Last-Event-ID`.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AskRequest"
      responses:
        "200":
          description: Server-sent QA events. Event names are `ask.token`, `ask.citations`, `ask.warning`, and `ask.done`.
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/SseEnvelope"
        "400":
          $ref: "#/components/responses/ApiError"
        "401":
          $ref: "#/components/responses/ApiError"
        "403":
          $ref: "#/components/responses/ApiError"
        "404":
          $ref: "#/components/responses/ApiError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ApiError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    CollectionId:
      name: collectionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DocumentId:
      name: documentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VersionId:
      name: versionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    JobId:
      name: jobId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DownloadToken:
      name: token
      in: path
      required: true
      schema:
        type: string
        maxLength: 256
    Limit:
      name: limit
      in: query
      required: false
      description: Page size; defaults to 25 and must be between 1 and 100.
      schema:
        type: string
    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque cursor returned as `pageInfo.nextCursor`.
      schema:
        type: string
        maxLength: 512
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Optional visible-ASCII idempotency key, 1-128 bytes, using alphanumeric characters plus `.`, `_`, `-`, and `:`.
      schema:
        type: string
        minLength: 1
        maxLength: 128
    LastEventId:
      name: Last-Event-ID
      in: header
      required: false
      description: SSE replay cursor formatted as `{streamUuid}:{sequence}`.
      schema:
        type: string
  headers:
    RetryAfter:
      description: Seconds to wait before retrying.
      schema:
        type: string
    QuotaResource:
      description: Quota resource kind that was checked.
      schema:
        type: string
        enum: [storage_bytes, documents]
    QuotaLimit:
      description: Resource limit.
      schema:
        type: string
    QuotaUsed:
      description: Committed resource usage.
      schema:
        type: string
    QuotaReserved:
      description: Currently reserved resource usage.
      schema:
        type: string
    QuotaRemaining:
      description: Remaining resource budget.
      schema:
        type: string
  responses:
    ApiError:
      description: Canonical API error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    RateLimited:
      description: Request rate limit exceeded. `ApiError.code` is `rate_limited`.
      headers:
        Retry-After:
          $ref: "#/components/headers/RetryAfter"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    QuotaOrRateLimited:
      description: Request rate limit exceeded (`rate_limited`) or upload quota exceeded (`quota_exceeded`).
      headers:
        Retry-After:
          $ref: "#/components/headers/RetryAfter"
        x-quota-resource:
          $ref: "#/components/headers/QuotaResource"
        x-quota-limit:
          $ref: "#/components/headers/QuotaLimit"
        x-quota-used:
          $ref: "#/components/headers/QuotaUsed"
        x-quota-reserved:
          $ref: "#/components/headers/QuotaReserved"
        x-quota-remaining:
          $ref: "#/components/headers/QuotaRemaining"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
  schemas:
    Health:
      type: object
      required: [status, requestId]
      properties:
        status:
          type: string
          enum: [ok]
        requestId:
          type: string
          format: uuid
    ApiError:
      type: object
      description: |
        Canonical API error. Stable `code` values currently returned by shipped routes include
        `validation_failed`, `unauthorized`, `invalid_credentials`, `invalid_refresh`,
        `refresh_reuse`, `user_disabled`, `membership_missing`, `auth_unavailable`,
        `permission_denied`, `collection_denied`, `empty_scope`, `not_found`,
        `state_conflict`, `rate_limited`, `dependency_unavailable`,
        `configuration_invalid`, `storage_unavailable`, `multipart_invalid`,
        `upload_rejected`, `upload_too_large`, `quota_exceeded`,
        `quota_not_configured`, `quota_invalid_key`, `quota_invalid_amount`,
        `quota_arithmetic_overflow`, `quota_reservation_not_found`,
        `quota_reservation_resource_mismatch`, `quota_reservation_conflict`,
        `quota_refunded_cannot_finalize`, `quota_expired_cannot_finalize`,
        `quota_finalized_cannot_refund`, `quota_database_error`, and `internal_error`.
      required: [code, message, requestId]
      properties:
        code:
          type: string
        message:
          type: string
        requestId:
          type: string
          format: uuid
        details: {}
