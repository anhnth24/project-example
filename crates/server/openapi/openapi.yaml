openapi: 3.1.0
info:
  title: Markhand Web API
  version: 0.1.0
  description: Phase 1B POC API contract.
servers:
  - url: /api/v1
paths:
  /health/live:
    get:
      operationId: healthLive
      responses:
        "200":
          description: Process health; does not contact dependencies.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /health/ready:
    get:
      operationId: healthReady
      responses:
        "200":
          description: PostgreSQL, Qdrant and MinIO are reachable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "503":
          $ref: "#/components/responses/ApiError"
components:
  responses:
    ApiError:
      description: Canonical API error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
  schemas:
    Health:
      type: object
      required: [status, requestId]
      properties:
        status:
          type: string
          enum: [ok]
        requestId:
          type: string
          format: uuid
    ApiError:
      type: object
      required: [code, message, requestId]
      properties:
        code:
          type: string
        message:
          type: string
        requestId:
          type: string
          format: uuid
        details: {}
    PageInfo:
      type: object
      required: [hasMore]
      properties:
        nextCursor:
          type: [string, "null"]
        hasMore:
          type: boolean
