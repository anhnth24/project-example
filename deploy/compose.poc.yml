  MARKHAND_JOB_LEASE_SECONDS: "${MARKHAND_JOB_LEASE_SECONDS:-60}"
  MARKHAND_MAX_ARCHIVE_ENTRIES: "${MARKHAND_MAX_ARCHIVE_ENTRIES:-4096}"
