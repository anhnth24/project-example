# Observability overlay for the POC stack.
#
# Usage (shares POC networks/volumes):
#   docker compose --env-file deploy/.env \
#     -f deploy/compose.poc.yml \
#     -f deploy/observability/compose.observability.yml \
#     up -d
#
# Standalone (external network must already exist):
#   MARKHAND_COMPOSE_PROJECT=markhand-poc docker compose \
#     -f deploy/observability/compose.observability.yml up -d
#
# Docker is required at runtime. This VM may not have Docker; validation uses
# pinned promtool + YAML parsers instead of a live stack.
name: ${MARKHAND_COMPOSE_PROJECT:-markhand-poc}

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.156.0@sha256:125bdbeb7590cc1952c5b3430ecf14063568980c2c93d5b38676cc0446ed8108
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel/collector-prometheus.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:8889:8889"
      - "127.0.0.1:13133:13133"
    networks: [private]
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2@sha256:4032c6d5bfd752342c3e631c2f1de93ba6b86c41db6b167b9a35372c139e7706
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run|var/lib/docker/.+)($$|/)
      - --web.listen-address=:9100
    volumes:
      - /:/host:ro,rslave
      - postgres_data:/var/lib/postgresql:ro
      - minio_data:/data:ro
    networks: [private]
    restart: unless-stopped
    pid: host

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0@sha256:b04a9fef4fa086a02fc7fcd8dcdbc4b7b35cc30cdee860fdc6a19dd8b208d63e
    command:
      - --config.file=/etc/blackbox/blackbox.yml
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox/blackbox.yml:ro
    networks: [private]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1@sha256:2659f4c2ebb718e7695cb9b25ffa7d6be64db013daba13e05c875451cf51b0d3
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --storage.tsdb.retention.time=7d
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/recording_rules.yml:/etc/prometheus/rules/recording_rules.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/rules/alert_rules.yml:ro
    ports:
      - "127.0.0.1:9090:9090"
    depends_on: [otel-collector, alertmanager, node-exporter, blackbox-exporter]
    networks: [private]
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0@sha256:e13b6ed5cb929eeaee733479dce55e10eb3bc2e9c4586c705a4e8da41e5eacf5
    volumes:
      - ./alertmanager/alertmanager.example.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "127.0.0.1:9093:9093"
    networks: [private]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0@sha256:408afb9726de5122b00a2576763a8a57a3c86d5b0eff5305bc994ceb3eb96c3f
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on: [prometheus]
    networks: [private]
    restart: unless-stopped

networks:
  private:
    # When used as overlay with compose.poc.yml, this merges with POC `private`.
    # Standalone: set external:true and name ${MARKHAND_COMPOSE_PROJECT}_private.
    driver: bridge

volumes:
  postgres_data:
  minio_data:
