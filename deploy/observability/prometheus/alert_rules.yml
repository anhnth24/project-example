# Alert rules for P1B-O02 (active / loaded).
# Threshold provenance: see deploy/observability/thresholds.yaml.
# `for` windows are O02 operational paging policy, not formal G0 gates.
groups:
  - name: markhand.alerts.slo
    rules:
      - alert: MarkhandQueryLatencyP95Burn
        expr: markhand:api_search:p95_5m > 0.5
        for: 10m
        labels:
          severity: page
          team: operations
          class: slo
        annotations:
          summary: Search API P95 latency exceeds G0-SLO-QUERY-P95 (500ms).
          description: >
            markhand:api_search:p95_5m (route=search) is above 0.5s for 10m (`for` = O02 policy).
            Formal gate: bench/markhand_web/gates.yaml#G0-SLO-QUERY-P95.
            Does not use internal retrieval-leg latency.
          threshold_source: G0-SLO-QUERY-P95
          runbook: docs/runbooks/dependency-outage.md
          dashboard: markhand-slo

      - alert: MarkhandSearchAvailabilityBurn
        expr: |
          markhand:api_search:success_ratio_5m < 0.995
          and on()
          (sum(rate(markhand_api_requests_total{route="search"}[5m])) > 0)
        for: 15m
        labels:
          severity: page
          team: operations
          class: slo
        annotations:
          summary: Search API success ratio below 99.5% availability target.
          description: >
            route=search 2xx success ratio over 5m is below 0.995 for 15m (`for` = O02 policy).
            Recording rule forces missing 2xx series to 0 via `or vector(0)`, so 5xx-only
            traffic yields numerator 0 and fires. Empty search traffic is gated out.
            Source: docs/markhand-web-sla-targets.md Service availability (search population only).
          threshold_source: SLA-AVAILABILITY
          runbook: docs/runbooks/dependency-outage.md
          dashboard: markhand-slo

  - name: markhand.alerts.queue
    rules:
      - alert: MarkhandQueueOldestAgeHigh
        expr: markhand:queue:oldest_age_seconds_max > 7200
        for: 5m
        labels:
          severity: page
          team: operations
          class: queue
        annotations:
          summary: Oldest queue age exceeds 120-minute recovery target.
          description: >
            Queue oldest age > 7200s. Source: docs/markhand-web-sla-targets.md Queue age.
            `for` 5m is O02 paging policy.
          threshold_source: SLA-QUEUE-AGE-MINUTES
          runbook: docs/runbooks/stuck-dead-jobs.md
          dashboard: markhand-queue

      - alert: MarkhandQueueDepthWarning
        expr: markhand:queue:depth_max > 600
        for: 10m
        labels:
          severity: ticket
          team: operations
          class: queue
        annotations:
          summary: Queue depth exceeds half-hour peak ingest backlog buffer.
          description: >
            Depth > 600 derived from G0-CAP peak 1200 docs/hour * 0.5h.
            Operational derivation, not a separate formal gate.
          threshold_source: WORKLOAD-PEAK-INGEST-DOCS-PER-HOUR
          runbook: docs/runbooks/stuck-dead-jobs.md
          dashboard: markhand-queue

      # increase() so a single dead-letter event fires; no long `for` that swallows spikes.
      - alert: MarkhandDeadLetterJobs
        expr: markhand:job:dead_letter_increase_5m > 0
        labels:
          severity: ticket
          team: operations
          class: queue
        annotations:
          summary: At least one job transitioned to dead_letter in the last 5m.
          description: >
            Uses increase(...[5m]) so a single event is visible and clears when the
            window slides past the event. Not rate()+long for.
            Policy: O02-OPS-DEAD-LETTER-EVENT (event-based), not error-ratio.
          threshold_source: O02-OPS-DEAD-LETTER-EVENT
          runbook: docs/runbooks/stuck-dead-jobs.md
          dashboard: markhand-queue

  - name: markhand.alerts.disk
    rules:
      - alert: MarkhandHostRootFilesystemLow
        expr: markhand:disk:host_root_free_ratio < 0.30
        for: 10m
        labels:
          severity: page
          team: operations
          class: disk
        annotations:
          summary: Host root filesystem free space below 30% headroom target.
          description: >
            node_exporter host bind-mount reports free ratio on mountpoint="/" under 0.30.
            This is host capacity only. Docker named-volume attribution (PG/MinIO
            pgdata/miniodata) is unavailable/blocked — see alert_rules.blocked.yml
            MarkhandNamedVolumeDiskLow.
            Source: workload-profile.yaml hardware.headroomPercent.disk=30.
          threshold_source: WORKLOAD-DISK-HEADROOM-PERCENT
          runbook: docs/runbooks/disk-exhaustion.md
          dashboard: markhand-ops

  - name: markhand.alerts.dependency
    rules:
      - alert: MarkhandDependencyProbeDown
        expr: |
          probe_success{dependency=~"postgres|qdrant|minio|embedding|markhand_ready"} == 0
        for: 2m
        labels:
          severity: page
          team: operations
          class: dependency
        annotations:
          summary: Dependency blackbox probe is failing.
          description: >
            probe_success==0 for a bounded dependency label (HTTP or TCP module).
            GLM blackbox probe is intentionally absent (no configured endpoint).
            Policy: O02-OPS-PROBE-FAILURE (boolean probe), not error-ratio.
          threshold_source: O02-OPS-PROBE-FAILURE
          runbook: docs/runbooks/dependency-outage.md
          dashboard: markhand-deps

      - alert: MarkhandScrapeTargetDown
        expr: up{job=~"otel-collector|node|blackbox-http|blackbox-tcp"} == 0
        for: 2m
        labels:
          severity: page
          team: operations
          class: dependency
        annotations:
          summary: Prometheus scrape target is down.
          description: >
            up==0 for an observability scrape job. `for` 2m is O02 policy.
            Policy: O02-OPS-PROBE-FAILURE (target absence/unreachable).
          threshold_source: O02-OPS-PROBE-FAILURE
          runbook: docs/runbooks/dependency-outage.md
          dashboard: markhand-deps

      - alert: MarkhandDependencyProbeAbsent
        expr: |
          count(
            absent(probe_success{dependency="postgres"})
            or absent(probe_success{dependency="qdrant"})
            or absent(probe_success{dependency="minio"})
            or absent(probe_success{dependency="embedding"})
            or absent(probe_success{dependency="markhand_ready"})
          ) > 0
        for: 5m
        labels:
          severity: page
          team: operations
          class: dependency
        annotations:
          summary: Expected dependency probe series is absent.
          description: >
            Blackbox probe metrics missing for a required dependency label.
            Indicates mis-scraped exporter, not necessarily dependency outage.
            Policy: O02-OPS-PROBE-FAILURE (metric absence).
          threshold_source: O02-OPS-PROBE-FAILURE
          runbook: docs/runbooks/dependency-outage.md
          dashboard: markhand-deps

      - alert: MarkhandEmbeddingErrorOutbreak
        expr: markhand:embedding:failure_ratio_10m > 0.05
        for: 10m
        labels:
          severity: page
          team: operations
          class: dependency
        annotations:
          summary: Embedding failure ratio exceeds 5% outbreak threshold.
          description: >
            Failures include result=~error|http_error|invalid_response|other.
            Threshold source: O02-OPS-ERROR-OUTBREAK-RATIO (operational policy).
          threshold_source: O02-OPS-ERROR-OUTBREAK-RATIO
          runbook: docs/runbooks/dependency-outage.md
          dashboard: markhand-deps

      - alert: MarkhandRetrievalErrorOutbreak
        expr: markhand:retrieval:failure_ratio_10m > 0.05
        for: 10m
        labels:
          severity: page
          team: operations
          class: dependency
        annotations:
          summary: Retrieval failure ratio exceeds 5% outbreak threshold.
          description: result=~error|other over 10m. Operational outbreak policy.
          threshold_source: O02-OPS-ERROR-OUTBREAK-RATIO
          runbook: docs/runbooks/dependency-outage.md
          dashboard: markhand-deps

      - alert: MarkhandGlmProviderErrors
        expr: markhand:qa_provider:failure_ratio_10m > 0.05
        for: 10m
        labels:
          severity: ticket
          team: operations
          class: dependency
        annotations:
          summary: GLM/qa_provider failure ratio exceeds outbreak threshold.
          description: >
            Metric-based only (result=~error|outage|timeout|truncated|other).
            No GLM blackbox probe — endpoint not configured in deploy stack.
          threshold_source: O02-OPS-ERROR-OUTBREAK-RATIO
          runbook: docs/runbooks/glm-fallback.md
          dashboard: markhand-deps

  - name: markhand.alerts.parser
    rules:
      - alert: MarkhandConversionErrorOutbreak
        expr: markhand:conversion:error_ratio_10m > 0.05
        for: 10m
        labels:
          severity: page
          team: operations
          class: parser
        annotations:
          summary: Conversion/parser failure ratio exceeds 5% outbreak threshold.
          description: result=~error|other. Operational outbreak policy.
          threshold_source: O02-OPS-ERROR-OUTBREAK-RATIO
          runbook: docs/runbooks/converter-outbreak.md
          dashboard: markhand-ops

  - name: markhand.alerts.drift
    rules:
      - alert: MarkhandDriftDetected
        expr: markhand:drift:increase_10m > 10
        for: 5m
        labels:
          severity: ticket
          team: operations
          class: drift
        annotations:
          summary: Drift event count exceeds O02 operational policy.
          description: >
            >10 drift events in 10m. Source: O02-OPS-DRIFT-COUNT (not SLA-derived).
            Real drift signal from markhand_drift_total. Reconcile result="error" is
            blocked (product emits success|drift on markhand_reconcile_total).
          threshold_source: O02-OPS-DRIFT-COUNT
          runbook: docs/runbooks/vector-rebuild.md
          dashboard: markhand-ops

  - name: markhand.alerts.security
    rules:
      - alert: MarkhandAuthDenySpike
        expr: markhand:auth:deny_increase_10m > 50
        for: 5m
        labels:
          severity: ticket
          team: security
          class: auth
        annotations:
          summary: Auth deny count spike (operational policy).
          description: >
            >50 deny decisions in 10m. Source: O02-OPS-AUTH-DENY-COUNT.
            Not an SLA/availability-derived ratio; count-based ops signal.
          threshold_source: O02-OPS-AUTH-DENY-COUNT
          runbook: docs/runbooks/key-rotation.md
          dashboard: markhand-ops
