# Prometheus scrape config for Markhand Web O02.
# Designed as a compose overlay on deploy/compose.poc.yml (shared `private` network).
# Service names match compose.poc.yml: api, postgres, qdrant, minio, mock-embedding.
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    system: markhand
    env: poc

rule_files:
  - /etc/prometheus/rules/recording_rules.yml
  - /etc/prometheus/rules/alert_rules.yml
  # alert_rules.blocked.yml is intentionally NOT loaded.

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          component: otel-collector

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          component: node

  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://api:8787/api/v1/health/ready
        labels:
          dependency: markhand_ready
      - targets:
          - http://qdrant:6333/healthz
        labels:
          dependency: qdrant
      - targets:
          - http://minio:9000/minio/health/live
        labels:
          dependency: minio
      # Default mock profile service name from compose.poc.yml.
      # For aiteamvn profile, override via file_sd / extra scrape (embedding-cpu:8080/health).
      - targets:
          - http://mock-embedding:8080/health
        labels:
          dependency: embedding
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
      - action: labeldrop
        regex: instance

  - job_name: blackbox-tcp
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
          - postgres:5432
        labels:
          dependency: postgres
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
      - action: labeldrop
        regex: instance
