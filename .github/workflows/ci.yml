name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

# Một ref chỉ cần run mới nhất. Commit mới trên cùng PR sẽ hủy run cũ.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  # PR commit mới thay thế commit cũ. Master runs không được hủy nhau vì mỗi run
  # phân loại delta riêng; hủy run trước có thể bỏ sót gate của delta đó.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes-and-static:
    runs-on: ubuntu-22.04
    outputs:
      rust: ${{ steps.changes.outputs.rust }}
      rust_crates: ${{ steps.changes.outputs.rust_crates }}
      rust_desktop_deps: ${{ steps.changes.outputs.rust_desktop_deps }}
      knowledge: ${{ steps.changes.outputs.knowledge }}
      frontend: ${{ steps.changes.outputs.frontend }}
      web: ${{ steps.changes.outputs.web }}
      dev_stack: ${{ steps.changes.outputs.dev_stack }}
      dev_stack_mode: ${{ steps.changes.outputs.dev_stack_mode }}
      bundle: ${{ steps.changes.outputs.bundle }}
      toolchain: ${{ steps.changes.outputs.toolchain }}
      corpus: ${{ steps.changes.outputs.corpus }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - id: changes
        name: Classify changed paths
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          python3 scripts/classify-ci-changes.py \
            --base "$BASE_SHA" \
            --head HEAD \
            --github-output "$GITHUB_OUTPUT"
      - run: bash scripts/check-foundation-gate.sh --static-only

  rust:
    needs: changes-and-static
    if: needs.changes-and-static.outputs.rust == 'true'
    runs-on: ubuntu-22.04
    env:
      RUST_CRATES: ${{ needs.changes-and-static.outputs.rust_crates }}
      KNOWLEDGE_GATE: ${{ needs.changes-and-static.outputs.knowledge }}
      RUST_INTEGRATION: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
      # Compiler-output cache across runs/jobs (survives Cargo.lock churn better than
      # target/ caching). Incremental off is recommended with sccache.
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # The knowledge-extraction gate compiles fileconv-desktop, which links
      # GTK/webkit — so the desktop GUI libs are needed whenever desktop deps
      # OR the knowledge gate runs, not just when app/ changed. Missing this is
      # what made knowledge-only PRs fail on gdk-3.0 after ~15 min of compiling.
      - name: Install native build dependencies (with desktop GUI libs)
        if: needs.changes-and-static.outputs.rust_desktop_deps == 'true' || needs.changes-and-static.outputs.knowledge == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang cmake pkg-config \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf
      - name: Install base build dependencies
        if: needs.changes-and-static.outputs.rust_desktop_deps != 'true' && needs.changes-and-static.outputs.knowledge != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang cmake pkg-config
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Rust fmt, clippy, and tests
        run: bash scripts/run-rust-ci-fast.sh

  rust-integration:
    needs: changes-and-static
    # DB-backed acceptance tests in crates/server/tests/*.rs are `#[ignore]`
    # gated on MARKHAND_TEST_DATABASE_URL / MARKHAND_TEST_MINIO_* /
    # MARKHAND_TEST_QDRANT_URL. The fast `rust` job never sets those vars or
    # passes `--include-ignored`, so this job is the only place they actually
    # run. Gate matches what already makes the fast job exercise
    # fileconv-server (full/workspace/smoke rust_crates or a scope containing
    # "server"), plus knowledge changes (future-proofing: no ignored DB tests
    # live under crates/knowledge today, but the pattern is the same), plus
    # every master push so regressions can't merge silently.
    if: >-
      needs.changes-and-static.outputs.rust == 'true' &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
        needs.changes-and-static.outputs.rust_crates == 'full' ||
        needs.changes-and-static.outputs.rust_crates == 'workspace' ||
        needs.changes-and-static.outputs.rust_crates == 'smoke' ||
        contains(needs.changes-and-static.outputs.rust_crates, 'server') ||
        needs.changes-and-static.outputs.knowledge == 'true'
      )
    runs-on: ubuntu-22.04
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      CARGO_INCREMENTAL: "0"
      RUST_BACKTRACE: "1"
      # Dual-role DB URLs (deploy/dev/compose.yml defaults):
      # - admin/superuser: CREATE/DROP ephemeral databases + migrate
      # - markhand_app: application pool for FORCE RLS / tenant assertions
      MARKHAND_TEST_DATABASE_URL: postgresql://markhand:markhand_dev_only@127.0.0.1:54329/markhand
      MARKHAND_TEST_APP_DATABASE_URL: postgresql://markhand_app:markhand_app_dev_only@127.0.0.1:54329/markhand
      MARKHAND_TEST_MINIO_ENDPOINT: http://127.0.0.1:9000
      MARKHAND_TEST_MINIO_ACCESS_KEY: markhand
      MARKHAND_TEST_MINIO_SECRET_KEY: markhand_dev_only
      MARKHAND_TEST_MINIO_REGION: us-east-1
      MARKHAND_TEST_QDRANT_URL: http://127.0.0.1:6333
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install base build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang cmake pkg-config \
            tesseract-ocr tesseract-ocr-vie
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.88.0
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Start Postgres, Qdrant, MinIO (deploy/dev/compose.yml)
        # Only the three services the integration tests actually need — not
        # the full dev stack (otel/embedding are irrelevant here and would
        # only slow the job down; index_worker.rs uses an in-process mock
        # embedding TCP server instead).
        run: docker compose -f deploy/dev/compose.yml up -d postgres qdrant minio
      - name: Wait for Postgres/Qdrant/MinIO to be ready
        run: |
          set -euo pipefail
          COMPOSE=(docker compose -f deploy/dev/compose.yml)

          postgres_ready=false
          for _ in $(seq 1 60); do
            id="$("${COMPOSE[@]}" ps -q postgres)"
            if [[ -n "$id" ]] && [[ "$(docker inspect --format '{{.State.Health.Status}}' "$id")" == "healthy" ]]; then
              echo "healthy: postgres"
              postgres_ready=true
              break
            fi
            sleep 1
          done
          if [[ "$postgres_ready" != "true" ]]; then
            echo "unhealthy: postgres" >&2
            "${COMPOSE[@]}" logs postgres >&2 || true
            exit 1
          fi

          qdrant_ready=false
          for _ in $(seq 1 90); do
            if curl --fail --silent --show-error http://127.0.0.1:6333/healthz >/dev/null; then
              echo "healthy: qdrant"
              qdrant_ready=true
              break
            fi
            sleep 1
          done
          if [[ "$qdrant_ready" != "true" ]]; then
            echo "unhealthy: qdrant" >&2
            "${COMPOSE[@]}" logs qdrant >&2 || true
            exit 1
          fi

          minio_ready=false
          for _ in $(seq 1 30); do
            if curl --fail --silent --show-error http://127.0.0.1:9000/minio/health/live >/dev/null; then
              echo "healthy: minio"
              minio_ready=true
              break
            fi
            sleep 1
          done
          if [[ "$minio_ready" != "true" ]]; then
            echo "unhealthy: minio" >&2
            "${COMPOSE[@]}" logs minio >&2 || true
            exit 1
          fi
      - name: Bootstrap non-superuser markhand_app role
        run: bash deploy/scripts/bootstrap-server-role.sh
      - name: Rust DB-backed integration tests (fileconv-server, --include-ignored)
        id: integration_tests
        # Blocking gate. Skip the live E2E opt-in test so missing MARKHAND_E2E
        # stays an honest not_run (#[ignore] + --skip), not a soft-return pass.
        # retrieval_vertical_slice runs ConvertWorker against target/debug/fileconv;
        # build fileconv-cli first (no audio — vertical slice only needs text formats).
        # Use cargo --no-fail-fast so one red binary still surfaces the full backlog.
        run: >-
          cargo build -p fileconv-cli --no-default-features &&
          cargo test -p fileconv-server --no-fail-fast --
          --include-ignored
          --skip e2e_live_vertical_slice
      - name: Dump service logs on failure
        if: steps.integration_tests.outcome == 'failure'
        run: docker compose -f deploy/dev/compose.yml logs --tail=200
      - name: Tear down dev services
        if: always()
        run: docker compose -f deploy/dev/compose.yml down -v

  toolchain:
    needs: changes-and-static
    if: needs.changes-and-static.outputs.toolchain == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.88.0
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      - run: make check-toolchain

  corpus:
    needs: changes-and-static
    if: needs.changes-and-static.outputs.corpus == 'true'
    # generator-environment.lock.json pins fonts-dejavu-core 2.37-8 from Ubuntu 24.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: bench/markhand_web/requirements-corpus.txt
      - run: python3 -m pip install -r bench/markhand_web/requirements-corpus.txt
      - run: make check-corpus

  frontend:
    needs: changes-and-static
    if: needs.changes-and-static.outputs.frontend == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: make check-desktop

  web:
    needs: changes-and-static
    if: needs.changes-and-static.outputs.web == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: make check-web

  dev-stack:
    needs: changes-and-static
    if: needs.changes-and-static.outputs.dev_stack == 'true'
    runs-on: ubuntu-22.04
    env:
      MARKHAND_SPIKE_REPORT: /tmp/markhand-spike-environment.json
      COMPOSE_PROFILES: mock
      DEV_STACK_MODE: ${{ needs.changes-and-static.outputs.dev_stack_mode }}
      DEV_STACK_RUST_SERVER: ${{ needs.changes-and-static.outputs.rust == 'true' && (needs.changes-and-static.outputs.rust_crates == 'full' || contains(needs.changes-and-static.outputs.rust_crates, 'server')) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.88.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        if: needs.changes-and-static.outputs.dev_stack_mode == 'full' && needs.changes-and-static.outputs.rust != 'true'
      - name: Validate and smoke-test local services
        run: bash deploy/scripts/dev-stack-ci.sh

  linux-bundle:
    needs: changes-and-static
    if: needs.changes-and-static.outputs.bundle == 'true'
    runs-on: ubuntu-22.04
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install native bundle dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang cmake pkg-config \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf file tesseract-ocr
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.88.0
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: python3 scripts/prepare-desktop-runtime.py --platform linux
      - run: make bundle-linux
