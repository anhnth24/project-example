services:
  postgres:
    ports: !override
      - "127.0.0.1:${MARKHAND_SPIKE_POSTGRES_PORT:-15432}:5432"
    shm_size: 1gb
    labels:
      markhand.environment: benchmark-spike

  qdrant:
    ports: !override
      - "127.0.0.1:${MARKHAND_SPIKE_QDRANT_HTTP_PORT:-16333}:6333"
      - "127.0.0.1:${MARKHAND_SPIKE_QDRANT_GRPC_PORT:-16334}:6334"
    labels:
      markhand.environment: benchmark-spike

  minio:
    ports: !override
      - "127.0.0.1:${MARKHAND_SPIKE_MINIO_API_PORT:-19000}:9000"
      - "127.0.0.1:${MARKHAND_SPIKE_MINIO_CONSOLE_PORT:-19001}:9001"
    labels:
      markhand.environment: benchmark-spike

  otel:
    ports: !override
      - "127.0.0.1:${MARKHAND_SPIKE_OTEL_HEALTH_PORT:-13143}:13133"
      - "127.0.0.1:${MARKHAND_SPIKE_OTEL_GRPC_PORT:-14317}:4317"
    labels:
      markhand.environment: benchmark-spike

  mock-embedding:
    ports: !override
      - "127.0.0.1:${MARKHAND_SPIKE_MOCK_EMBEDDING_PORT:-18088}:8080"
    environment:
      MARKHAND_MOCK_EMBEDDING_DIMENSIONS: ${MARKHAND_SPIKE_MOCK_DIMENSIONS:-1024}
    labels:
      markhand.environment: benchmark-spike

  vllm:
    ports: !override
      - "127.0.0.1:${MARKHAND_SPIKE_VLLM_PORT:-18000}:8000"
    volumes:
      - model_cache:/root/.cache:rw
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${MARKHAND_SPIKE_GPU_COUNT:-1}
              capabilities: [gpu]
    labels:
      markhand.environment: benchmark-spike

volumes:
  postgres_data:
    name: ${MARKHAND_SPIKE_VOLUME_PREFIX:-markhand-spike}_postgres
  qdrant_data:
    name: ${MARKHAND_SPIKE_VOLUME_PREFIX:-markhand-spike}_qdrant
  minio_data:
    name: ${MARKHAND_SPIKE_VOLUME_PREFIX:-markhand-spike}_minio
  model_cache:
    name: ${MARKHAND_SPIKE_VOLUME_PREFIX:-markhand-spike}_models
