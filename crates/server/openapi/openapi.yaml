openapi: 3.1.0
info:
  title: Markhand Web API
  version: 0.1.0
  description: Phase 1B POC `/api/v1` contract (R02/R04/R05/R06). Does not expose secrets or internal
    object keys.
servers:
- url: /
tags:
- name: Health
- name: Auth
- name: Collections
- name: Documents
- name: Conflicts
- name: Citations
- name: Jobs
- name: Uploads
- name: Search
- name: Ask
paths:
  /live:
    get:
      operationId: rootLive
      tags:
      - Health
      summary: Process liveness (root)
      responses: &id001
        '200':
          description: Alive
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
        '429': &id003
          $ref: '#/components/responses/RateLimited'
    head:
      operationId: rootLiveHead
      tags:
      - Health
      summary: Process liveness (root) (HEAD)
      responses: *id001
  /ready:
    get:
      operationId: rootReady
      tags:
      - Health
      summary: Readiness (root)
      responses: &id002
        '200':
          description: Ready
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
        '503':
          $ref: '#/components/responses/ApiError'
        '429':
          $ref: '#/components/responses/RateLimited'
    head:
      operationId: rootReadyHead
      tags:
      - Health
      summary: Readiness (root) (HEAD)
      responses: *id002
  /startup:
    get:
      operationId: rootStartup
      tags:
      - Health
      summary: One-way startup completion (root)
      responses: &id004
        '200':
          description: Startup completed
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Startup'
        '503':
          description: Still starting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Startup'
        '429': *id003
    head:
      operationId: rootStartupHead
      tags:
      - Health
      summary: One-way startup completion (root) (HEAD)
      responses: *id004
  /api/v1/health/live:
    get:
      operationId: healthLive
      tags:
      - Health
      summary: Process liveness
      responses: &id005
        '200':
          description: Alive
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
        '429': *id003
    head:
      operationId: healthLiveHead
      tags:
      - Health
      summary: Process liveness (HEAD)
      responses: *id005
  /api/v1/health/ready:
    get:
      operationId: healthReady
      tags:
      - Health
      summary: Readiness (deps/signature/reconciliation)
      responses: &id006
        '200':
          description: Ready
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
        '503':
          $ref: '#/components/responses/ApiError'
        '429':
          $ref: '#/components/responses/RateLimited'
    head:
      operationId: healthReadyHead
      tags:
      - Health
      summary: Readiness (deps/signature/reconciliation) (HEAD)
      responses: *id006
  /api/v1/health/startup:
    get:
      operationId: healthStartup
      tags:
      - Health
      summary: One-way startup completion
      responses: &id007
        '200':
          description: Startup completed
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Startup'
        '503':
          description: Still starting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Startup'
        '429': *id003
    head:
      operationId: healthStartupHead
      tags:
      - Health
      summary: One-way startup completion (HEAD)
      responses: *id007
  /api/v1/auth/login:
    post:
      operationId: authLogin
      tags:
      - Auth
      summary: Password login
      responses:
        '200':
          description: Tokens
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/ApiError'
        '401':
          $ref: '#/components/responses/ApiError'
        '429':
          $ref: '#/components/responses/RateLimited'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
  /api/v1/auth/refresh:
    post:
      operationId: authRefresh
      tags:
      - Auth
      summary: Refresh session
      responses:
        '200':
          description: Rotated tokens
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/ApiError'
        '429':
          $ref: '#/components/responses/RateLimited'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
  /api/v1/auth/logout:
    post:
      operationId: authLogout
      tags:
      - Auth
      summary: Logout / revoke refresh family
      responses:
        '204':
          description: Logged out
        '401':
          $ref: '#/components/responses/ApiError'
        '429': *id003
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
  /api/v1/auth/me:
    get:
      operationId: authMe
      tags:
      - Auth
      summary: Current principal
      responses:
        '200':
          description: Current principal
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/ApiError'
        '429': *id003
        '403': &id008
          $ref: '#/components/responses/ApiError'
      security:
      - bearerAuth: []
    head:
      operationId: authMeHead
      tags:
      - Auth
      summary: Current principal (HEAD)
      responses:
        '200':
          description: Current principal
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/ApiError'
        '429': *id003
        '403': *id008
      security:
      - bearerAuth: []
  /api/v1/collections:
    get:
      operationId: listCollections
      tags:
      - Collections
      summary: List collections
      responses:
        '200':
          description: Collection page
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionList'
        '401':
          $ref: '#/components/responses/ApiError'
        '403':
          $ref: '#/components/responses/ApiError'
        '429': *id003
      security:
      - bearerAuth: []
      parameters:
      - &id010
        $ref: '#/components/parameters/Limit'
      - &id011
        $ref: '#/components/parameters/Cursor'
    post:
      operationId: createCollection
      tags:
      - Collections
      summary: Create collection
      responses:
        '201':
          description: Created
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection'
        '400':
          $ref: '#/components/responses/ApiError'
        '401':
          $ref: '#/components/responses/ApiError'
        '403':
          $ref: '#/components/responses/ApiError'
        '429':
          $ref: '#/components/responses/RateLimited'
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectionCreate'
    head:
      operationId: listCollectionsHead
      tags:
      - Collections
      summary: List collections (HEAD)
      responses:
        '200':
          description: Collection page
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionList'
        '401':
          $ref: '#/components/responses/ApiError'
        '403':
          $ref: '#/components/responses/ApiError'
        '429': *id003
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Cursor'
  /api/v1/collections/{collectionId}:
    get:
      operationId: getCollection
      tags:
      - Collections
      summary: Get collection
      responses:
        '200':
          description: Collection
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection'
        '401':
          $ref: '#/components/responses/ApiError'
        '404':
          $ref: '#/components/responses/ApiError'
        '429': *id003
        '403': *id008
      security:
      - bearerAuth: []
      parameters:
      - &id009
        $ref: '#/components/parameters/CollectionId'
    patch:
      operationId: updateCollection
      tags:
      - Collections
      summary: Update collection
      responses:
        '200':
          description: Updated
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection'
        '400':
          $ref: '#/components/responses/ApiError'
        '401':
          $ref: '#/components/responses/ApiError'
        '404':
          $ref: '#/components/responses/ApiError'
        '429': *id003
        '403': *id008
      security:
      - bearerAuth: []
      parameters:
      - *id009
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectionUpdate'
    head:
      operationId: getCollectionHead
      tags:
      - Collections
      summary: Get collection (HEAD)
      responses:
        '200':
          description: Collection
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection'
        '401':
          $ref: '#/components/responses/ApiError'
        '404':
          $ref: '#/components/responses/ApiError'
        '429': *id003
        '403': *id008
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/CollectionId'
  /api/v1/documents:
    get:
      operationId: listDocuments
      tags:
      - Documents
      summary: List documents
      responses:
        '200':
          description: Document page
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentList'
        '401':
          $ref: '#/components/responses/ApiError'
        '429': *id003
        '403': *id008
      security:
      - bearerAuth: []
      parameters:
      - *id010
      - *id011
    head:
      operationId: listDocumentsHead
      tags:
      - Documents
      summary: List documents (HEAD)
      responses:
        '200':
          description: Document page
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentList'
        '401':
          $ref: '#/components/responses/ApiError'
        '429': *id003
        '403': *id008
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Cursor'
  /api/v1/documents/{documentId}:
    get:
      operationId: getDocument
      tags:
      - Documents
      summary: Get document
      responses:
        '200':
          description: Document
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        '404':
          $ref: '#/components/responses/ApiError'
        '429': *id003
        '401': *id008
        '403': *id008
      security:
      - bearerAuth: []
      parameters:
      - &id012
        $ref: '#/components/parameters/DocumentId'
    delete:
      operationId: deleteDocument
      tags:
      - Documents
      summary: Tombstone document
      responses:
        '200':
          description: Tombstoned
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        '404':
          $ref: '#/components/responses/ApiError'
        '429': *id003
        '401': *id008
        '403': *id008
      security:
      - bearerAuth: []
      parameters:
      - *id012
    head:
      operationId: getDocumentHead
      tags:
      - Documents
      summary: Get document (HEAD)
      responses:
        '200':
          description: Document
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        '404':
          $ref: '#/components/responses/ApiError'
        '429': *id003
        '401': *id008
        '403': *id008
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/DocumentId'
  /api/v1/documents/{documentId}/reindex:
    post:
      operationId: reindexDocument
      tags:
      - Documents
      summary: Enqueue reindex
      responses:
        '200':
          description: Reindex enqueued
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReindexResponse'
        '409':
          $ref: '#/components/responses/ApiError'
        '429': *id003
        '401': *id008
        '403': *id008
      security:
      - bearerAuth: []
      parameters:
      - *id012
      - &id015
        $ref: '#/components/parameters/IdempotencyKey'
  /api/v1/documents/{documentId}/versions:
    get:
      operationId: listDocumentVersions
      tags:
      - Documents
      summary: List versions
      responses:
        '200':
          description: Version page
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentVersionList'
        '429': *id003
        '401': *id008
        '403': *id008
      security:
      - bearerAuth: []
      parameters:
      - *id012
      - *id010
      - *id011
    head:
      operationId: listDocumentVersionsHead
      tags:
      - Documents
      summary: List versions (HEAD)
      responses:
        '200':
          description: Version page
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentVersionList'
        '429': *id003
        '401': *id008
        '403': *id008
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/DocumentId'
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Cursor'
  /api/v1/documents/{documentId}/versions/{versionId}:
    get:
      operationId: getDocumentVersion
      tags:
      - Documents
      summary: Get version metadata (no object keys)
      responses:
        '200':
          description: Version metadata
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentVersion'
        '404':
          $ref: '#/components/responses/ApiError'
        '429': *id003
        '401': *id008
        '403': *id008
      security:
      - bearerAuth: []
      parameters:
      - *id012
      - &id013
        $ref: '#/components/parameters/VersionId'
    head:
      operationId: getDocumentVersionHead
      tags:
      - Documents
      summary: Get version metadata (no object keys) (HEAD)
      responses:
        '200':
          description: Version metadata
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentVersion'
        '404':
          $ref: '#/components/responses/ApiError'
        '429': *id003
        '401': *id008
        '403': *id008
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/DocumentId'
      - $ref: '#/components/parameters/VersionId'
  /api/v1/documents/{documentId}/versions/{versionId}/publish:
    post:
      operationId: publishDocumentVersion
      tags:
      - Documents
      summary: Publish version
      responses:
        '200':
          description: Published
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentVersion'
        '429': *id003
        '401': *id008
        '403': *id008
      security:
      - bearerAuth: []
      parameters:
      - *id012
      - *id013
  /api/v1/documents/{documentId}/versions/{leftVersionId}/diff/{rightVersionId}:
    get:
      operationId: diffDocumentVersions
      tags:
      - Documents
      summary: Metadata diff between versions
      responses:
        '200':
          description: Metadata diff
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionDiff'
        '429': *id003
        '401': *id008
        '403': *id008
      security:
      - bearerAuth: []
      parameters:
      - *id012
      - name: leftVersionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: rightVersionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    head:
      operationId: diffDocumentVersionsHead
      tags:
      - Documents
      summary: Metadata diff between versions (HEAD)
      responses:
        '200':
          description: Metadata diff
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionDiff'
        '429': *id003
        '401': *id008
        '403': *id008
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/DocumentId'
      - name: leftVersionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: rightVersionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
  /api/v1/documents/{documentId}/versions/{versionId}/preview:
    get:
      operationId: previewDocumentVersion
      tags:
      - Documents
      summary: Authorized markdown preview
      responses:
        '200':
          description: Preview
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreviewResponse'
        '403':
          $ref: '#/components/responses/ApiError'
        '404':
          $ref: '#/components/responses/ApiError'
        '429': *id003
        '401': *id008
      security:
      - bearerAuth: []
      parameters:
      - *id012
      - *id013
    head:
      operationId: previewDocumentVersionHead
      tags:
      - Documents
      summary: Authorized markdown preview (HEAD)
      responses:
        '200':
          description: Preview
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreviewResponse'
        '403':
          $ref: '#/components/responses/ApiError'
        '404':
          $ref: '#/components/responses/ApiError'
        '429': *id003
        '401': *id008
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/DocumentId'
      - $ref: '#/components/parameters/VersionId'
  /api/v1/documents/{documentId}/versions/{versionId}/download-capabilities:
    post:
      operationId: mintDownloadCapability
      tags:
      - Documents
      summary: Mint short-lived download capability
      responses:
        '200':
          description: Capability token
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadCapabilityResponse'
        '400':
          $ref: '#/components/responses/ApiError'
        '401':
          $ref: '#/components/responses/ApiError'
        '403':
          $ref: '#/components/responses/ApiError'
        '429':
          $ref: '#/components/responses/RateLimited'
      security:
      - bearerAuth: []
      parameters:
      - *id012
      - *id013
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DownloadCapabilityRequest'
  /api/v1/download-capabilities/redeem:
    post:
      operationId: redeemDownloadCapability
      tags:
      - Documents
      summary: Redeem download capability (binary media body)
      responses:
        '200':
          description: Authorized binary download body
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
            X-Content-Sha256:
              schema:
                type: string
              description: Content digest of the redeemed artifact
            Content-Disposition:
              schema:
                type: string
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '403':
          $ref: '#/components/responses/ApiError'
        '429':
          $ref: '#/components/responses/RateLimited'
        '401': *id008
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DownloadRedeemRequest'
  /api/v1/conflicts:
    get:
      operationId: listConflicts
      tags:
      - Conflicts
      summary: List conflicts
      responses:
        '200':
          description: Conflict page
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictList'
        '429': *id003
        '401': *id008
        '403': *id008
      security:
      - bearerAuth: []
      parameters:
      - *id010
      - *id011
    head:
      operationId: listConflictsHead
      tags:
      - Conflicts
      summary: List conflicts (HEAD)
      responses:
        '200':
          description: Conflict page
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictList'
        '429': *id003
        '401': *id008
        '403': *id008
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Cursor'
  /api/v1/conflicts/{conflictId}:
    get:
      operationId: getConflict
      tags:
      - Conflicts
      summary: Get conflict
      responses:
        '200':
          description: Conflict
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
